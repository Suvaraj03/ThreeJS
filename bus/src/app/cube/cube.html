<div #canvasContainer class="game"></div>

<div class="hud">
  <h2>🚌 Bus Simulator</h2>

  <p>Speed: {{ speed | number: '1.0-0' }}</p>

  <p>Score: {{ score | number: '1.0-0' }}</p>

  <p>Health: {{ health }}</p>
</div>

<!-- MOBILE CONTROLLER -->

<div class="controls">
  <button (touchstart)="moveLeft()" (touchend)="stopMove()">⬅️</button>

  <button (touchstart)="moveForward()" (touchend)="stopMove()">⬆️</button>

  <button (touchstart)="moveRight()" (touchend)="stopMove()">➡️</button>
</div>

<div class="gameOver" *ngIf="gameOver">
  <h1>GAME OVER</h1>

  <button (click)="restartGame()">Restart</button>
</div>
